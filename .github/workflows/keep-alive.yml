name: Keep Backend Alive

on:
  schedule:
    # Runs every minute (the fastest GitHub Actions allows) to keep Render awake.
    # Note: GitHub Actions may delay cron jobs by a few minutes during peak times.
    - cron: '* * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          echo "Pinging backend to keep it awake..."
          curl -sSf https://ipgenz-backend.onrender.com > /dev/null
          echo "Ping successful!"
